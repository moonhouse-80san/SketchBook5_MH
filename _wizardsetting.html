<style>
	.wizard-setting-panel { 
		display: inline-flex; 
		align-items: center; 
		gap: 15px;
		padding: 8px 16px; 
		margin: 5px; 
		background: #f8f9fa; 
		border: 1px solid #dee2e6; 
		border-radius: 6px; 
		width: fit-content; 
		flex-wrap: wrap;
	}
	.toggle-item { display: flex; align-items: center; gap: 10px; }
	.setting-label { font-size: 13px; font-weight: 600; color: #333; white-space: nowrap; }
	.toggle-container { display: flex; align-items: center; gap: 8px; }
	.panel-divider { width: 1px; height: 16px; background-color: #dee2e6; }
	
	/* Toggle Switch Style */
	.switch { position: relative; display: inline-block; width: 40px; height: 20px; }
	.switch input { opacity: 0; width: 0; height: 0; }
	.slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .3s; border-radius: 20px; }
	.slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
	
	input:checked + .slider { background-color: #2196F3; }
	input:checked + .slider:before { transform: translateX(20px); }
	
	/* Text Style */
	.toggle-status-text { font-size: 12px; white-space: nowrap; }
	.btn-link { color: #0056b3; text-decoration: none; font-weight: 600; }
	.btn-link:hover { text-decoration: underline; }
	.text-active { color: #2196F3; font-weight: 600; }
	.text-disabled { color: #888; }
</style>

<script>
	var adminSkinInfoUrl = '<?php echo getUrl('act', 'dispBoardAdminSkinInfo'); ?>';

	function handleWizardToggle(element) {
		if (element.checked) {
			location.href = adminSkinInfoUrl;
		} else {
			exeWizardUpdate('wizard', 'N', element);
		}
	}

	function exeWizardUpdate(targetName, val, element) {
		if (!confirm('설정을 변경하시겠습니까?')) {
			if (element) element.checked = !element.checked;
			return;
		}

		var $ = jQuery;
		var $originForm = $('#bd_wizard_scroll').find('form').first();

		// 위저드가 꺼져 있으면 무거운 설정 폼(_wizard.php)이 로드되지 않으므로,
		// 즉시 토글 대신 관리자 설정 페이지에서 변경하도록 이동한다.
		if (!$originForm.length) {
			location.href = adminSkinInfoUrl;
			return;
		}

		var formData = $originForm.serializeArray();

		var isReplaced = false;
		for (var i = 0; i < formData.length; i++) {
			if (formData[i].name === targetName) {
				formData[i].value = val;
				isReplaced = true;
				break;
			}
		}
		if (!isReplaced) formData.push({ name: targetName, value: val });

		$.post(request_uri, formData, function(data) {
			alert('설정이 저장되었습니다.');
			location.reload();
		}).fail(function() {
			alert('요청을 완료했습니다.');
			location.reload();
		});
	}
</script>
